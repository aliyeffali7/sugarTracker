<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>No Sugar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --text: #f0f0f0;
    --muted: #555;
    --win: #c8f560;
    --fail: #ff4444;
    --accent: #c8f560;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* HEADER */
  .header {
    padding: 48px 24px 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 0.02em;
    line-height: 0.9;
    color: var(--text);
  }

  .header-title span {
    color: var(--accent);
  }

  /* STREAK */
  .streak-section {
    padding: 32px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .streak-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    line-height: 1;
    color: var(--accent);
    min-width: 120px;
  }

  .streak-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .streak-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .streak-sublabel {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  .streak-sublabel strong {
    color: var(--text);
    font-weight: 500;
  }

  /* TODAY SECTION */
  .today-section {
    padding: 32px 24px;
    border-bottom: 1px solid var(--border);
  }

  .today-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .today-status {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 20px;
    font-weight: 300;
    min-height: 24px;
  }

  .today-status.clean {
    color: var(--win);
  }

  .today-status.failed {
    color: var(--fail);
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn {
    border: none;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 18px 12px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    font-weight: 500;
  }

  .btn:active { transform: scale(0.97); }

  .btn-win {
    background: var(--win);
    color: #0a0a0a;
  }

  .btn-fail {
    background: var(--surface2);
    color: var(--fail);
    border: 1px solid var(--fail);
  }

  .btn.selected-win {
    box-shadow: 0 0 0 2px var(--win), 0 0 20px rgba(200, 245, 96, 0.3);
  }

  .btn.selected-fail {
    box-shadow: 0 0 0 2px var(--fail), 0 0 20px rgba(255, 68, 68, 0.2);
    background: rgba(255,68,68,0.1);
  }

  /* CALENDAR */
  .calendar-section {
    padding: 32px 24px;
    flex: 1;
  }

  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .calendar-month {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.05em;
  }

  .cal-nav {
    display: flex;
    gap: 12px;
  }

  .cal-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .cal-nav button:active { background: var(--border); }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }

  .cal-weekday {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.1em;
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    position: relative;
    background: var(--surface);
  }

  .cal-day.empty { background: transparent; }

  .cal-day.today {
    border: 1px solid var(--accent);
  }

  .cal-day.win {
    background: var(--win);
    color: #0a0a0a;
    font-weight: 500;
  }

  .cal-day.fail {
    background: transparent;
    color: var(--fail);
    border: 1px solid rgba(255,68,68,0.3);
  }

  .cal-day.fail::after {
    content: '✕';
    position: absolute;
    font-size: 18px;
    opacity: 0.8;
  }

  .cal-day.fail .day-num { opacity: 0; }

  .cal-day.win .day-num { display: none; }
  .cal-day.win::after { content: '✓'; font-size: 18px; }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 2px;
  }

  .legend-dot.win { background: var(--win); }
  .legend-dot.fail { border: 1px solid var(--fail); }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    padding: 20px 16px;
    text-align: center;
    border-right: 1px solid var(--border);
  }

  .stat:last-child { border-right: none; }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 24px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.win { border-color: var(--win); color: var(--win); }
  .toast.fail { border-color: var(--fail); color: var(--fail); }

  .install-hint {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Daily Tracker</div>
  <div class="header-title">NO<br><span>SUGAR</span></div>
</div>

<div class="streak-section">
  <div class="streak-number" id="streakNum">0</div>
  <div class="streak-info">
    <div class="streak-label">Day Streak</div>
    <div class="streak-sublabel" id="streakSub">Start today.</div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-value" id="statTotal">0</div>
    <div class="stat-label">Clean Days</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="statFail">0</div>
    <div class="stat-label">Failed</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="statRate">—</div>
    <div class="stat-label">Win Rate</div>
  </div>
</div>

<div class="today-section">
  <div class="today-label">Today</div>
  <div class="today-status" id="todayStatus">Did you have zero sugar today?</div>
  <div class="btn-row">
    <button class="btn btn-win" id="btnWin" onclick="logDay(true)">✓ Zero Sugar</button>
    <button class="btn btn-fail" id="btnFail" onclick="logDay(false)">✕ I Slipped</button>
  </div>
</div>

<div class="calendar-section">
  <div class="calendar-header">
    <div class="calendar-month" id="calMonth">MARCH 2026</div>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="cal-weekdays">
    <div class="cal-weekday">Mo</div>
    <div class="cal-weekday">Tu</div>
    <div class="cal-weekday">We</div>
    <div class="cal-weekday">Th</div>
    <div class="cal-weekday">Fr</div>
    <div class="cal-weekday">Sa</div>
    <div class="cal-weekday">Su</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot win"></div> Zero sugar</div>
    <div class="legend-item"><div class="legend-dot fail"></div> Slipped</div>
  </div>
</div>

<div class="install-hint">📱 Add to Home Screen for app experience</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'nosugar_v1';
  let data = {};
  let viewYear, viewMonth;

  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function load() {
    try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } 
    catch(e) { data = {}; }
    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function logDay(success) {
    const key = todayKey();
    data[key] = success;
    save();
    render();
    showToast(
      success ? '✓ Clean day logged. Keep going.' : '✕ Happens. Reset tomorrow.',
      success ? 'win' : 'fail'
    );
  }

  function calcStreak() {
    const now = new Date();
    let streak = 0;
    let d = new Date(now);
    while(true) {
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (data[k] === true) { streak++; d.setDate(d.getDate()-1); }
      else break;
    }
    return streak;
  }

  function calcStats() {
    const vals = Object.values(data);
    const wins = vals.filter(v => v === true).length;
    const fails = vals.filter(v => v === false).length;
    const total = wins + fails;
    return { wins, fails, rate: total > 0 ? Math.round((wins/total)*100) : null };
  }

  function render() {
    const key = todayKey();
    const todayVal = data[key];
    const streak = calcStreak();
    const stats = calcStats();

    // Streak
    document.getElementById('streakNum').textContent = streak;
    if (streak === 0) document.getElementById('streakSub').innerHTML = 'Start today.';
    else if (streak === 1) document.getElementById('streakSub').innerHTML = '<strong>1 day.</strong> Keep it going.';
    else document.getElementById('streakSub').innerHTML = `<strong>${streak} days</strong> clean. Don't stop.`;

    // Stats
    document.getElementById('statTotal').textContent = stats.wins;
    document.getElementById('statFail').textContent = stats.fails;
    document.getElementById('statRate').textContent = stats.rate !== null ? stats.rate + '%' : '—';

    // Today buttons
    const btnWin = document.getElementById('btnWin');
    const btnFail = document.getElementById('btnFail');
    btnWin.className = 'btn btn-win' + (todayVal === true ? ' selected-win' : '');
    btnFail.className = 'btn btn-fail' + (todayVal === false ? ' selected-fail' : '');

    const statusEl = document.getElementById('todayStatus');
    if (todayVal === true) { statusEl.textContent = 'Zero sugar today. Solid.'; statusEl.className = 'today-status clean'; }
    else if (todayVal === false) { statusEl.textContent = 'You slipped today. Tomorrow counts.'; statusEl.className = 'today-status failed'; }
    else { statusEl.textContent = 'Did you have zero sugar today?'; statusEl.className = 'today-status'; }

    // Calendar
    renderCalendar();
  }

  function renderCalendar() {
    const monthNames = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
    document.getElementById('calMonth').textContent = `${monthNames[viewMonth]} ${viewYear}`;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1);
    let startDow = firstDay.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0

    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const nowKey = todayKey();

    for (let i = 0; i < startDow; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const k = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const el = document.createElement('div');
      let cls = 'cal-day';
      if (k === nowKey) cls += ' today';
      if (data[k] === true) cls += ' win';
      else if (data[k] === false) cls += ' fail';
      el.className = cls;
      const num = document.createElement('span');
      num.className = 'day-num';
      num.textContent = d;
      el.appendChild(num);
      grid.appendChild(el);
    }
  }

  function changeMonth(dir) {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => { t.className = `toast ${type}`; }, 2500);
  }

  load();
  render();
</script>
</body>
</html>
